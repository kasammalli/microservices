# Audit service configuration - override in microservice's src/main/resources if needed.
# Defines allowed actions and trackable attributes per entity type.

audit:
  entities:
    order:
      actions:
        - orderCreate
        - orderUpdate
      attributes:
        - quantity
        - deliverySlot
        - items
        - orderNumber
        - storeId
